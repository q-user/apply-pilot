name: apply-pilot
services:
  db:
    image: postgres:16-alpine
    container_name: apply-pilot-db
    environment:
      POSTGRES_USER: apply_pilot
      POSTGRES_PASSWORD: apply_pilot
      POSTGRES_DB: apply_pilot
    ports:
    - 5432:5432
    volumes:
    - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U apply_pilot -d apply_pilot
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
  redis:
    image: redis:7-alpine
    container_name: apply-pilot-redis
    ports:
    - 6379:6379
    volumes:
    - redis-data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: apply-pilot:local
    container_name: apply-pilot-api
    environment:
      APP_DATABASE_URL: postgresql+psycopg2://apply_pilot:apply_pilot@db:5432/apply_pilot
      DATABASE_URL: postgresql+psycopg2://apply_pilot:apply_pilot@db:5432/apply_pilot
      APP_REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      REDIS_URL: redis://redis:6379/0
    ports:
    - 8000:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  apply-pilot-max-bot:
    build: .
    image: apply-pilot:dev
    container_name: apply-pilot-max-bot
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_DATABASE_URL: ${APP_DATABASE_URL:-sqlite+pysqlite:////data/app.db}
      REDIS_URL: redis://redis:6379/0
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:?set MAX_BOT_TOKEN in .env}
      MAX_POLLING_TIMEOUT: ${MAX_POLLING_TIMEOUT:-30}
    command:
    - /app/.venv/bin/apply-pilot-max-bot
    volumes:
    - ./.data:/data
    restart: unless-stopped
    mem_limit: 128m
    cpus: '0.5'
    networks:
    - default
    extra_hosts:
    - host.docker.internal:host-gateway
  migrate:
    image: apply-pilot:local
    container_name: apply-pilot-migrate
    environment:
      DATABASE_URL: postgresql+psycopg2://apply_pilot:apply_pilot@db:5432/apply_pilot
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    command:
    - alembic
    - upgrade
    - head
    restart: 'no'
volumes:
  db-data: null
  redis-data: null
